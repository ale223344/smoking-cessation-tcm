<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>中医戒烟助手 </title>
    <style>
        :root {
            --bg: #FFF8EC;
            --card: #FFFDF7;
            --border: #D4A96A;
            --accent: #8B4513;
            --accent2: #C0392B;
            --text: #3E2723;
            --sub: #6D4C41;
            --gold: #B8860B;
            --tag-bg: #F5E6D3;
            --tag-sel: #8B4513;
            --shadow: 0 4px 12px rgba(139,69,19,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
            background: var(--bg);
            color: var(--text);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(218,165,105,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(180,130,80,0.08) 0%, transparent 60%);
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.7;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px 18px 40px;
        }

        /* ========== Header ========== */
        .header {
            text-align: center;
            padding: 24px 12px 8px;
            position: relative;
        }
        .header .seal {
            display: inline-block;
            border: 2.5px solid var(--accent2);
            color: var(--accent2);
            padding: 6px 18px;
            font-size: 14px;
            letter-spacing: 3px;
            transform: rotate(-3deg);
            font-weight: bold;
            margin-bottom: 14px;
            opacity: 0.85;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            margin: 6px 0;
        }
        .header h1 .icon { font-size: 28px; margin: 0 4px; }
        .header .sub {
            font-size: 13px;
            color: var(--sub);
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .header .divider {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 12px auto 0;
            border-radius: 1px;
        }

        /* ========== Card ========== */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin: 14px 0;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dotted var(--border);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .dot {
            width: 8px;
            height: 8px;
            background: var(--accent2);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ========== Tag Input ========== */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            padding: 9px 15px;
            border-radius: 24px;
            font-size: 14px;
            border: 1px solid var(--border);
            background: var(--tag-bg);
            color: var(--text);
            cursor: pointer;
            user-select: none;
            transition: all 0.25s;
            letter-spacing: 0.5px;
        }
        .tag:active { transform: scale(0.95); }
        .tag.selected {
            background: var(--tag-sel);
            color: #FFFDF7;
            border-color: var(--tag-sel);
            box-shadow: 0 2px 8px rgba(139,69,19,0.25);
        }
        .tag.hint {
            background: #FFF8EC;
            border-style: dashed;
            font-size: 13px;
            color: #8B7355;
            cursor: default;
        }

        /* ========== Text Input ========== */
        .text-input-area {
            margin-top: 10px;
        }
        .text-input-area textarea {
            width: 100%;
            height: 72px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            background: var(--card);
            color: var(--text);
            letter-spacing: 0.5px;
            line-height: 1.6;
        }
        .text-input-area textarea::placeholder {
            color: #BBA58A;
        }

        /* ========== Buttons ========== */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 11px 22px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--accent);
            color: #FFFDF7;
            flex: 1;
            min-width: 120px;
        }
        .btn-primary:hover { background: #6B3410; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover { background: rgba(139,69,19,0.05); }

        /* ========== Result ========== */
        .result-area { margin-top: 8px; }

        .syndrome-card {
            border-left: 4px solid var(--accent);
            background: #FFFDF7;
            border-radius: 0 10px 10px 0;
            padding: 14px 16px;
            margin: 14px 0;
            box-shadow: var(--shadow);
            animation: fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .syndrome-card .syn-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent2);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .syndrome-card .syn-match {
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .syndrome-card .section {
            margin: 8px 0;
        }
        .syndrome-card .section-label {
            font-weight: 700;
            color: var(--accent);
            font-size: 14px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .syndrome-card .section-content {
            font-size: 14px;
            color: var(--text);
            padding-left: 8px;
            border-left: 2px solid #E8D5B7;
            margin-left: 4px;
        }
        .syndrome-card .formula {
            background: #FDF5E6;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 3px 0;
            font-size: 13.5px;
        }
        .no-result {
            text-align: center;
            padding: 30px;
            color: #BBA58A;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* ========== Footer ========== */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #BBA58A;
            padding: 20px 0 10px;
            letter-spacing: 0.5px;
        }
        .footer a { color: var(--accent); text-decoration: none; }

        /* ========== Smooth ========== */
        html { scroll-behavior: smooth; }

        @media (max-width: 480px) {
            .header h1 { font-size: 21px; }
            .tag { padding: 8px 12px; font-size: 13px; }
            .btn { padding: 10px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ==================== HEADER ==================== -->
    <div class="header">
        <div class="seal">戒 断 调 理</div>
        <h1><span class="icon">🌿</span>AI+中医药辅助戒烟<span class="icon">🌿</span></h1>
        <p class="sub">戒断期多症状 · 证型 · 辨证调理体系</p>
        <div class="divider"></div>
    </div>

    <!-- ==================== 输入区 ==================== -->
    <div class="card" id="inputCard">
        <div class="card-title"><span class="dot"></span>请选择或输入您的戒断症状</div>

        <!-- 标签选择 -->
        <div class="tag-group" id="tagGroup"></div>

        <!-- 文字输入 -->
        <div class="text-input-area">
            <textarea id="textInput" placeholder="或在此自由输入症状，如：最近总是失眠、烦躁想抽烟、喉咙干痒……"></textarea>
        </div>

        <!-- 按钮 -->
        <div class="btn-row">
            <button class="btn btn-primary" onclick="analyze()">🔍 开始辨证分析</button>
            <button class="btn btn-outline" onclick="resetAll()">↺ 重新选择</button>
        </div>
    </div>

    <!-- ==================== 结果区 ==================== -->
    <div id="resultArea" class="result-area"></div>

    <!-- ==================== FOOTER ==================== -->
    <div class="footer">
        <p>依据《中药学》《中医内科学》 · 药食同源目录 · 控烟中医药共识</p>
        <p>本系统仅供参考，具体情况请咨询执业中医师</p>
    </div>

</div>

            ],

// ======================== 初始化标签 ========================
const tagGroup = document.getElementById('tagGroup');

const groupLabels = [
    { id: 'liver', label: '【情绪·肝】' },
    { id: 'heart', label: '【睡眠·心】' },
    { id: 'spleen', label: '【疲乏·脾肺】' },
    { id: 'lungYin', label: '【咽喉·肺阴】' },
    { id: 'lungQi', label: '【胸闷·气机】' },
    { id: 'phlegm', label: '【头目·痰热】' },
    { id: 'stomach', label: '【消化·脾胃】' }
];

groupLabels.forEach(group => {
    const syn = SYNDROME_DB.find(s => s.id === group.id);
    if (!syn) return;

    // 小标题
    const labelSpan = document.createElement('span');
    labelSpan.className = 'tag hint';
    labelSpan.textContent = group.label;
    labelSpan.style.cssText = 'width:100%;margin-top:6px;border:none;background:transparent;font-weight:700;color:#8B4513;padding:4px 0;cursor:default;';
    tagGroup.appendChild(labelSpan);

    // 该证型的症状标签
    syn.keywords.forEach(kw => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = kw;
        span.onclick = function() { this.classList.toggle('selected'); };
        tagGroup.appendChild(span);
    });
});

// ======================== 文本分词匹配 ========================

    const tokens = [];
    // 常见症状词组优先匹配
    const phrases = [

        '干咳','少痰','口干','胸闷','憋胀','嗳气','打嗝','头晕','头胀',
        '头昏','恶心','反胃','腹胀','便秘','便溏','口苦','胁痛','叹气',
        '闷胀','憋气','健忘','昏沉','困重','虚弱','燥热'
    ];
    const lower = text.toLowerCase();
    phrases.forEach(p => {
        if (lower.includes(p)) tokens.push(p);
    });
    return tokens;
}

// ======================== 分析函数 ========================
function analyze() {
    // 收集标签选择
    const selectedTags = [];
    document.querySelectorAll('#tagGroup .tag.selected').forEach(t => {
        selectedTags.push(t.textContent.trim());
    });

    // 收集文本输入
    const textVal = document.getElementById('textInput').value.trim();
    const textTokens = tokenize(textVal);

    // 合并所有命中词
    const allHits = [...new Set([...selectedTags, ...textTokens])];

    // 重置匹配计数
    SYNDROME_DB.forEach(s => s.matchCount = 0);

    // 匹配
    allHits.forEach(hit => {
        SYNDROME_DB.forEach(syn => {
            syn.keywords.forEach(kw => {
                if (kw === hit || kw.includes(hit) || hit.includes(kw)) {
                    syn.matchCount++;
                }
            });
        });
    });

    // 筛选命中数>0的，按匹配度降序
    const matched = SYNDROME_DB.filter(s => s.matchCount > 0)
        .sort((a, b) => b.matchCount - a.matchCount);

    const resultArea = document.getElementById('resultArea');

    if (matched.length === 0) {
        resultArea.innerHTML = '<div class="no-result">🔍 未匹配到对应证型<br><small>请补充更多症状或尝试文字输入</small></div>';
        return;
    }

    // 渲染结果
    let html = '';
    matched.forEach((syn, idx) => {
        const totalKw = syn.keywords.length;
        const pct = Math.round((syn.matchCount / (allHits.length || 1)) * 100);
        html += `
        <div class="syndrome-card" style="animation-delay:${idx * 0.1}s">
            <div class="syn-name">【${idx + 1}】${syn.name}</div>
            <div class="syn-match">匹配度：命中 ${syn.matchCount} 项关联症状 | 建议优先关注</div>

            <div class="section">
                <div class="section-label">📖 权威病机</div>
                <div class="section-content">${syn.content.mechanism}</div>
            </div>

            <div class="section">
                <div class="section-label">🍵 药食同源代茶饮</div>
                <div class="section-content">
                    ${syn.content.teas.map(t => `<div class="formula"><strong>${t.name}：</strong>${t.detail}</div>`).join('')}
                </div>
            </div>

            <div class="section">
                <div class="section-label">📍 穴位按压</div>
                <div class="section-content">${syn.content.acupoints}</div>
            </div>

            <div class="section">
                <div class="section-label">🧘 导引调摄</div>
                <div class="section-content">${syn.content.daoyin}</div>
            </div>
        </div>`;
    });

    resultArea.innerHTML = html;
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======================== 重置 ========================
function resetAll() {
    document.querySelectorAll('#tagGroup .tag.selected').forEach(t => t.classList.remove('selected'));
    document.getElementById('textInput').value = '';
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('inputCard').scrollIntoView({ behavior: 'smooth' });
}
</script>
